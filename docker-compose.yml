version: '3.8'

services:
  nexus-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-node-1
    environment:
      - node.name=nexus-1
      - cluster.name=nexus-dev
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - nexus.aero.s3.endpoint=http://minio:9000
      - nexus.aero.s3.bucket=nexus-segments
      - nexus.aero.s3.access_key=nexus
      - nexus.aero.s3.secret_key=nexus123
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - nexus-data:/var/lib/nexus710
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nexus-net

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nexus
      MINIO_ROOT_PASSWORD: nexus123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  minio-init:
    image: minio/mc:latest
    container_name: nexus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set nexusminio http://minio:9000 nexus nexus123;
      mc mb nexusminio/nexus-segments --ignore-existing;
      echo 'Bucket nexus-segments created';
      "
    networks:
      - nexus-net

volumes:
  nexus-data:
    driver: local
  minio-data:
    driver: local

networks:
  nexus-net:
    driver: bridge
